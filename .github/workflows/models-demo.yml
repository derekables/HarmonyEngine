name: Use GitHub Models

on: [push]

permissions:
  models: read

jobs:
  call-model:
    runs-on: ubuntu-latest
    steps:
      - name: Call AI model
        env:
          GITHUB_TOKEN: ${{ secrets.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}}
        run: |
          curl "https://models.github.ai/inference/chat/completions" \
             -H "Content-Type: application/json" \
             -H "Authorization: Bearer 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" \
             -d '{
              "messages": [
                  {
                     "role": "user",
                     "content": "Explain the concept of recursion."
                  }
               ],
               "model": "openai/gpt-4o"
            }'
